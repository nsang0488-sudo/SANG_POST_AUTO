<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANG AUTO PRO - PREMIUM CRM</title>
<link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>

<style>
:root{
--primary:#ffffff;
--accent:#38bdf8;
--accent-gradient:linear-gradient(135deg,#38bdf8,#2563eb);
--gold-gradient:linear-gradient(135deg,#fbbf24,#d97706);
--green-gradient:linear-gradient(135deg,#34d399,#059669);
--bg:#0f172a;
--card:#1e293b;
--border:#334155;
--text-main:#f8fafc;
--text-dim:#94a3b8;
--danger:#f43f5e;
--warning:#fbbf24;
--success:#10b981;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text-main);font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding-bottom:90px}

#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--card);padding:40px;border-radius:24px;border:1px solid var(--border);width:90%;max-width:360px;text-align:center}
.login-box input{text-align:center;font-size:18px;letter-spacing:5px}

#app-content{display:none}

.header{background:rgba(15,23,42,.9);padding:20px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:19px;letter-spacing:5px;font-weight:900;margin:0}
.header span{color:var(--accent);font-size:10px}

.container{max-width:600px;margin:auto;padding:15px}

.tab-content{display:none}
.tab-content.active{display:block}

.section-title{font-size:12px;font-weight:800;color:var(--text-dim);text-transform:uppercase;margin:25px 0 10px}

.card{background:linear-gradient(145deg,#1e293b,#0f172a);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:15px}

label{font-size:11px;color:var(--text-dim)}
input,textarea,select{width:100%;background:#0f172a;border:1px solid var(--border);color:#fff;padding:15px;border-radius:12px;margin-bottom:18px}

.search-bar{background:var(--card);border-radius:20px;padding:14px;border:1px solid var(--border);margin-bottom:20px;color:#fff}

.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.image-item{aspect-ratio:1/1;border-radius:10px;overflow:hidden}
.image-item img{width:100%;height:100%;object-fit:cover}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:12px}
.btn-main{background:var(--text-main);color:#000}
.btn-success{background:var(--green-gradient);color:#fff}
.btn-danger{background:rgba(244,63,94,.1);color:var(--danger)}
.btn-check{background:rgba(56,189,248,.1);color:var(--accent)}

.bottom-nav{position:fixed;bottom:0;width:100%;background:#0f172a;border-top:1px solid var(--border);display:flex;height:85px}
.nav-item{flex:1;text-align:center;color:var(--text-dim);font-size:9px}
.nav-item.active{color:var(--accent)}

.tag{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800}
.tag-nong{background:rgba(244,63,94,.15);color:var(--danger)}
.tag-am{background:rgba(251,191,36,.15);color:var(--warning)}
.tag-nguoi{background:rgba(56,189,248,.15);color:var(--accent)}
.tag-chot{background:var(--gold-gradient);color:#fff}

.urgent{border:1px solid var(--danger)}

#toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:14px 28px;border-radius:30px;display:none}
</style>
</head>

<body>

<div id="login-screen">
<div class="login-box">
<h2>SANG AUTO PRO</h2>
<input type="password" id="access-key">
<button class="btn btn-main" onclick="verifyAccess()">MỞ KHÓA</button>
</div>
</div>

<div id="app-content">

<div id="toast">OK</div>

<div class="header">
<h1>SANG AUTO PRO</h1>
<span>PREMIUM CRM</span>
</div>

<div class="container">

<!-- INPUT -->
<div id="tab-input" class="tab-content active">

<div class="card">
<label>Phân loại</label>
<select id="form-type" onchange="toggleFormFields()">
<option value="mua">KHÁCH MUA</option>
<option value="ban">KHÁCH BÁN</option>
</select>
</div>

<div class="card">

<label>Tên</label>
<input id="cus-name">

<label>SĐT</label>
<input id="cus-phone">

<label>Xe</label>
<input id="cus-car">

<label>Đời / màu</label>
<input id="cus-year-color">

<div id="field-finance-mua">
<label>Tài chính</label>
<input id="cus-finance-mua">
</div>

<div id="field-finance-ban" style="display:none">
<label>Tài chính xe</label>
<select id="cus-finance-ban">
<option>Không vay</option>
<option>Vay ngân hàng</option>
</select>
</div>

<label>Tag</label>
<select id="cus-tag">
<option value="nong">NÓNG</option>
<option value="am">ẤM</option>
<option value="nguoi">NGUỘI</option>
</select>

<textarea id="cus-detail"></textarea>

<div id="field-images" style="display:none">
<input type="file" id="cus-images" multiple onchange="handleImagePreview(this)">
<div id="preview-grid" class="image-grid"></div>
</div>

<button class="btn btn-main" onclick="saveCustomer()">LƯU</button>

</div>
</div>

<div id="tab-buyers" class="tab-content">
<input class="search-bar" id="search-buyer" oninput="renderList('mua')">
<div id="list-buyers"></div>
</div>

<div id="tab-sellers" class="tab-content">
<input class="search-bar" id="search-seller" oninput="renderList('ban')">
<div id="list-sellers"></div>
</div>

<div id="tab-closed" class="tab-content">
<input class="search-bar" id="search-closed" oninput="renderList('chot')">
<div id="list-closed"></div>
</div>

<!-- BOT -->
<div id="tab-hunt" class="tab-content">

<h2 class="section-title">BOT SĂN TIN</h2>

<div class="card">

<label>ID GROUP</label>
<textarea id="hunt-groups"></textarea>

<label>KEYWORD</label>
<input id="hunt-keywords">

<label>INTERVAL</label>
<input id="hunt-interval" value="10">

<button class="btn btn-main" onclick="saveBotSettings()">LƯU CẤU HÌNH</button>

</div>

<div id="list-hunted"></div>

</div>

</div>

<div class="bottom-nav">

<a class="nav-item active" onclick="switchTab('input',this)">INPUT</a>
<a class="nav-item" onclick="switchTab('buyers',this)">MUA</a>
<a class="nav-item" onclick="switchTab('sellers',this)">BÁN</a>
<a class="nav-item" onclick="switchTab('closed',this)">CHỐT</a>
<a class="nav-item" onclick="switchTab('hunt',this)">BOT</a>

</div>
</div>

<script>

function verifyAccess(){
if(document.getElementById("access-key").value==="190525"){
sessionStorage.setItem("crm_unlocked","true")
login-screen.style.display="none"
app-content.style.display="block"
}
}

document.addEventListener("DOMContentLoaded",()=>{
if(sessionStorage.getItem("crm_unlocked")){
login-screen.style.display="none"
app-content.style.display="block"
}
})

const firebaseConfig={
databaseURL:"https://sang-post-auto-default-rtdb.asia-southeast1.firebasedatabase.app"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let allCustomers=[]

function switchTab(id,el){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"))
document.getElementById("tab-"+id).classList.add("active")
el.classList.add("active")
}

function showToast(t){
const e=document.getElementById("toast")
e.innerText=t
e.style.display="block"
setTimeout(()=>e.style.display="none",3000)
}

function toggleFormFields(){
const isMua=document.getElementById("form-type").value==="mua"
document.getElementById("field-finance-mua").style.display=isMua?"block":"none"
document.getElementById("field-finance-ban").style.display=isMua?"none":"block"
document.getElementById("field-images").style.display=isMua?"none":"block"
}

function handleImagePreview(input){
const grid=document.getElementById("preview-grid")
grid.innerHTML=""
Array.from(input.files).forEach(f=>{
const r=new FileReader()
r.onload=e=>grid.innerHTML+=`<div class="image-item"><img src="${e.target.result}"></div>`
r.readAsDataURL(f)
})
}

async function saveCustomer(){

const id="cus_"+Date.now()

const data={
id:id,
type:form-type.value,
status:"active",
name:cus-name.value,
phone:cus-phone.value,
car:cus-car.value,
year_color:cus-year-color.value,
finance:form-type.value==="mua"?cus-finance-mua.value:cus-finance-ban.value,
tag:cus-tag.value,
details:cus-detail.value,
created_at:Date.now(),
last_checked:Date.now()
}

await db.ref("crm_customers/"+id).set(data)

showToast("ĐÃ LƯU")
location.reload()

}

db.ref("crm_customers").on("value",snap=>{
allCustomers=[]
snap.forEach(c=>allCustomers.push(c.val()))
renderList("mua")
renderList("ban")
renderList("chot")
})

function renderList(type){

let list=document.getElementById(type==="mua"?"list-buyers":type==="ban"?"list-sellers":"list-closed")

list.innerHTML=""

let filtered=allCustomers.filter(c=>type==="chot"?c.status==="chot":c.type===type&&c.status!=="chot")

filtered.forEach(c=>{

list.innerHTML+=`
<div class="card">
<b>${c.name}</b>
<p>${c.phone}</p>
<p>${c.car}</p>

<button class="btn btn-check" onclick="db.ref('crm_customers/${c.id}').update({last_checked:Date.now()})">ĐÃ GỌI</button>
<button class="btn btn-success" onclick="db.ref('crm_customers/${c.id}').update({status:'chot',closed_at:Date.now()})">CHỐT</button>

</div>
`

})

}

function saveBotSettings(){
db.ref("config_bot").set({
groups:document.getElementById("hunt-groups").value,
keywords:document.getElementById("hunt-keywords").value,
interval:document.getElementById("hunt-interval").value
}).then(()=>showToast("ĐÃ GỬI BOT"))
}

db.ref("san_tin").limitToLast(20).on("value",snap=>{
const div=document.getElementById("list-hunted")
div.innerHTML=""
snap.forEach(c=>{
let v=c.val()
div.innerHTML+=`
<div class="card">
<p>${v.content}</p>
<a href="${v.link}" target="_blank" class="btn btn-check">XEM BÀI</a>
</div>
`
})
})

</script>

</body>
</html>
