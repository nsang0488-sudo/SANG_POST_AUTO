<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANG AUTO PRO - MULTI-IMAGE SYSTEM</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>

    <style>
        /* --- PROFESSIONAL DARK THEME --- */
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding-bottom: 90px;
        }

        /* Header Section */
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 18px; letter-spacing: 4px; font-weight: 900; margin: 0; color: var(--primary); }
        .header span { color: var(--accent); font-size: 10px; display: block; letter-spacing: 1px; }

        .container { max-width: 550px; margin: auto; padding: 15px; }

        /* Tabs Logic */
        .tab-content { display: none; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Card & Forms */
        .section-title { font-size: 12px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin: 25px 0 15px 5px; letter-spacing: 1px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
        input, textarea, select {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: #fff; padding: 14px; border-radius: 10px; font-size: 15px; margin-bottom: 15px;
            transition: border 0.3s ease;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        
        /* Multi-Image Preview Grid */
        .image-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px;
        }
        .image-item {
            aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #222; border: 1px solid var(--border);
        }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main { background: var(--primary); color: #000; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); font-size: 12px; padding: 10px; }
        .btn-update { background: var(--accent); color: #fff; margin-top: 10px; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); border-top: 1px solid var(--border);
            display: flex; height: 80px; padding-bottom: 10px;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); font-size: 10px; font-weight: 700; text-decoration: none;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* Campaign Item in Settings */
        .campaign-item {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 15px; margin-bottom: 15px;
        }
        .campaign-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }
        
        /* Acc Badges */
        .badge-xanh { background: #0052cc; color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 8px; }
        .badge-trang { background: #e3e3e3; color: black; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 8px; }

        /* Toast Notification */
        #toast {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; font-size: 13px;
            display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div id="toast">Cập nhật thành công!</div>

    <div class="header">
        <h1>SANG AUTO PRO</h1>
        <span>PREMIUM CONTROL INTERFACE</span>
    </div>

    <div class="container">
        <div id="tab-post" class="tab-content active">
            <h2 class="section-title">Khởi tạo chiến dịch xe</h2>
            <div class="card">
                
                <label>Giao việc cho tài khoản nào?</label>
                <select id="car-account">
                    <option value="fb_xanh">🔵 Facebook Xanh</option>
                    <option value="fb_trang">⚪ Facebook Trắng</option>
                </select>

                <label>Tên định danh xe (VD: Sedona 2021 Trắng)</label>
                <input type="text" id="car-name" placeholder="Dùng để quản lý nhiều xe">

                <label>Hình ảnh chi tiết (Chọn nhiều ảnh cùng lúc)</label>
                <input type="file" id="car-images" accept="image/*" multiple onchange="handleImagePreview(this)">
                <div class="image-grid" id="preview-grid">
                    </div>

                <label>Nội dung bài viết (Tâm huyết)</label>
                <textarea id="car-content" placeholder="Mô tả ưu điểm, giá bán, cam kết..."></textarea>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Khung giờ cố định</label>
                        <input type="text" id="car-times" placeholder="09:00, 14:00, 21:00">
                    </div>
                    <div style="flex: 1;">
                        <label>Cách nhau (Giờ)</label>
                        <input type="number" id="car-interval" value="8">
                    </div>
                </div>

                <label>Hội nhóm mục tiêu (Từ khóa)</label>
                <input type="text" id="car-groups" placeholder="Xpander, Xe cũ, Chợ ô tô">

                <button class="btn btn-main" id="btn-publish" onclick="publishCampaign()">
                    🚀 KÍCH HOẠT ĐĂNG BÀI
                </button>
            </div>
        </div>

        <div id="tab-setting" class="tab-content">
            <h2 class="section-title">Chiến dịch đang chạy</h2>
            <div id="campaign-list">
                </div>

            <h2 class="section-title">Cấu hình Auto Comment</h2>
            <div class="card">
                <label>Kịch bản trả lời khách (Mỗi dòng 1 câu - Random tránh quét)</label>
                <textarea id="setting-rep" style="height: 150px;" placeholder="Dạ anh check tin nhắn em nhé&#10;Xe còn ạ, anh xem inbox nha..."></textarea>
                <button class="btn btn-main" onclick="saveGlobalSettings()">💾 LƯU CẤU HÌNH PHẢN HỒI</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('post', this)">
            <span class="nav-icon">🚀</span>
            <span>GIAO VIỆC</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="switchTab('setting', this)">
            <span class="nav-icon">⚙️</span>
            <span>QUẢN LÝ</span>
        </a>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        // (Lưu ý: Đã đổi apikey bằng biến thật của bro)
        const firebaseConfig = {
            apiKey: "AIzaSyBVz4zVh8gxmNS4vbx39t0mVP7ZJJqH9T8",
            authDomain: "sang-post-auto.firebaseapp.com",
            databaseURL: "https://sang-post-auto-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sang-post-auto",
            storageBucket: "sang-post-auto.firebasestorage.app",
            appId: "1:1032829101121:web:277cdc0a9c517e1a8352c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";

        // --- 2. XỬ LÝ GIAO DIỆN TABS ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.style.display = "block";
            setTimeout(() => { t.style.display = "none"; }, 3000);
        }

        function handleImagePreview(input) {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = "";
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = "image-item";
                        div.innerHTML = `<img src="${e.target.result}">`;
                        grid.appendChild(div);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        // --- 3. NÉN VÀ UPLOAD NHIỀU ẢNH ---
        async function uploadImages(files) {
            const urls = [];
            const options = { maxSizeMB: 0.7, maxWidthOrHeight: 1200, useWebWorker: true };
            
            for (let file of files) {
                try {
                    const compressed = await imageCompression(file, options);
                    const formData = new FormData();
                    formData.append("image", compressed);
                    
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const resData = await response.json();
                    if(resData.success) urls.push(resData.data.url);
                } catch (err) { console.error("Lỗi nén/up ảnh:", err); }
            }
            return urls;
        }

        // --- 4. KÍCH HOẠT CHIẾN DỊCH ---
        async function publishCampaign() {
            const account = document.getElementById('car-account').value;
            const name = document.getElementById('car-name').value;
            const files = document.getElementById('car-images').files;
            const content = document.getElementById('car-content').value;
            const btn = document.getElementById('btn-publish');

            if(!name || files.length === 0 || !content) return alert("Vui lòng nhập đủ Tên, Nội dung và chọn ít nhất 1 ảnh!");

            btn.disabled = true;
            btn.innerText = "⏳ ĐANG XỬ LÝ NÉN ẢNH...";

            const imageUrls = await uploadImages(files);

            if(imageUrls.length > 0) {
                const campaignId = "car_" + Date.now();
                await db.ref('campaigns/' + campaignId).set({
                    id: campaignId,
                    account: account,  // LƯU TÀI KHOẢN ĐƯỢC PHÂN CÔNG
                    car_name: name,
                    images: imageUrls,
                    content: content,
                    fixed_times: document.getElementById('car-times').value,
                    interval: document.getElementById('car-interval').value,
                    groups: document.getElementById('car-groups').value.split(',').map(g => g.trim()),
                    status: "RUNNING",
                    current_group_idx: 0,
                    created_at: Date.now()
                });

                showToast("🚀 CHIẾN DỊCH ĐÃ SẴN SÀNG!");
                setTimeout(() => location.reload(), 1500);
            }
        }

        // --- 5. QUẢN LÝ REALTIME TRÊN TAB SETTING ---
        db.ref('campaigns').on('value', (snap) => {
            const list = document.getElementById('campaign-list');
            list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "<p style='text-align:center; color:#666;'>Chưa có xe nào.</p>"; return; }

            snap.forEach(child => {
                const car = child.val();
                
                // Tạo nhãn (badge) màu sắc tùy theo acc
                let accBadge = "";
                if(car.account === "fb_xanh") accBadge = `<span class="badge-xanh">FB XANH</span>`;
                else if(car.account === "fb_trang") accBadge = `<span class="badge-trang">FB TRẮNG</span>`;

                const item = document.createElement('div');
                item.className = "campaign-item";
                item.innerHTML = `
                    <div class="campaign-header">
                        <span style="font-weight:900; font-size:14px; display:flex; align-items:center;">
                            🚗 ${car.car_name} ${accBadge}
                        </span>
                        <div style="display:flex; align-items:center; gap:5px">
                            <span style="font-size:10px; font-weight:bold; color:#00ff88">ĐANG CHẠY</span>
                            <div class="status-dot"></div>
                        </div>
                    </div>
                    <div class="image-grid">
                        ${car.images.map(img => `<div class="image-item"><img src="${img}"></div>`).join('')}
                    </div>
                    <label>Nội dung (Sửa để Bot lấy bản mới)</label>
                    <textarea onchange="updateCarContent('${car.id}', this.value)">${car.content}</textarea>
                    <button class="btn btn-danger" onclick="deleteCar('${car.id}')">🛑 DỪNG & XÓA XE NÀY</button>
                `;
                list.appendChild(item);
            });
        });

        function updateCarContent(id, newText) {
            db.ref('campaigns/' + id).update({ content: newText });
            showToast("✅ Đã cập nhật nội dung mới!");
        }

        function deleteCar(id) {
            if(confirm("Xác nhận xe đã bán và muốn dừng đăng bài?")) {
                db.ref('campaigns/' + id).remove();
                showToast("🗑️ Đã xóa chiến dịch.");
            }
        }

        function saveGlobalSettings() {
            const repLines = document.getElementById('setting-rep').value.split('\n').filter(l => l.trim() !== '');
            db.ref('settings').set({ reply_templates: repLines }).then(() => {
                showToast("💾 Đã lưu mẫu phản hồi.");
            });
        }

        // Load settings
        db.ref('settings/reply_templates').once('value', s => {
            if(s.exists()) document.getElementById('setting-rep').value = s.val().join('\n');
        });

    </script>
</body>
</html>
