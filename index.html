<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANG AUTO PRO - CRM SYSTEM</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>

    <style>
        /* --- PROFESSIONAL DARK THEME --- */
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
            --danger: #ff4d4d;
            --warning: #f59e0b;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding-bottom: 90px;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 18px; letter-spacing: 4px; font-weight: 900; margin: 0; color: var(--primary); }
        .header span { color: var(--accent); font-size: 10px; display: block; letter-spacing: 1px; }

        .container { max-width: 600px; margin: auto; padding: 15px; }

        /* Tabs */
        .tab-content { display: none; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms & Inputs */
        .section-title { font-size: 13px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin: 20px 0 10px 5px; letter-spacing: 1px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; transition: all 0.3s;}
        
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
        input, textarea, select {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; margin-bottom: 15px;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .search-bar { background: #1a1a1a; border-radius: 20px; padding: 12px 20px; border: 1px solid var(--border); margin-bottom: 20px; font-size: 15px; width: 100%; color: #fff; }

        /* Image Grid */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .image-item { aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #222; border: 1px solid var(--border); }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--border); margin-top: 10px; font-size: 12px; padding: 10px;}
        .btn-check { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); font-size: 12px; padding: 10px; margin-top: 10px; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); border-top: 1px solid var(--border);
            display: flex; height: 80px; padding-bottom: 15px; z-index: 100;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); font-size: 10px; font-weight: 700; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Tags & Badges */
        .tag { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; display: inline-block; }
        .tag-nong { background: rgba(255, 77, 77, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .tag-am { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid var(--warning); }
        .tag-nguoi { background: rgba(59, 130, 246, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        /* URGENT CUSTOMER ALERT (Nóng + > 2 days) */
        .card.urgent { border: 2px solid var(--danger); box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .urgent-badge { position: absolute; top: -10px; right: -10px; background: var(--danger); color: #fff; font-size: 10px; font-weight: bold; padding: 5px 10px; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Toast */
        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; font-size: 13px; display: none; z-index: 1000; }
        
        .cus-info p { margin: 5px 0; font-size: 13px; color: #ccc;}
        .cus-info strong { color: #fff; }
    </style>
</head>
<body>

    <div id="toast">Thành công!</div>

    <div class="header">
        <h1>SANG AUTO PRO</h1>
        <span>SMART CRM SYSTEM</span>
    </div>

    <div class="container">
        
        <div id="tab-input" class="tab-content active">
            <h2 class="section-title">Phân loại dữ liệu</h2>
            <div class="card">
                <label>Bạn đang nhập dữ liệu cho:</label>
                <select id="form-type" onchange="toggleFormFields()" style="border-color: var(--accent); color: var(--accent); font-weight: bold;">
                    <option value="mua">🛒 KHÁCH CẦN MUA XE</option>
                    <option value="ban">🚗 KHÁCH CẦN BÁN XE</option>
                </select>
            </div>

            <h2 class="section-title">Thông tin cơ bản</h2>
            <div class="card">
                <label>1. Tên khách hàng</label>
                <input type="text" id="cus-name" placeholder="VD: Anh Tuấn">
                
                <label>2. Số điện thoại</label>
                <input type="tel" id="cus-phone" placeholder="09xxxxxxxxx">

                <label>3. Loại xe <span id="lbl-xe">khách cần</span></label>
                <input type="text" id="cus-car" placeholder="VD: Mazda 3, CX5...">

                <label>4. Đời xe, màu xe</label>
                <input type="text" id="cus-year-color" placeholder="VD: Đời 2020-2022, Màu Đỏ">

                <div id="field-finance-mua">
                    <label>5. Tài chính (Tiền mặt / Trả góp)</label>
                    <input type="text" id="cus-finance-mua" placeholder="VD: Có sẵn 300tr vay bank / Tiền mặt 700tr">
                </div>
                <div id="field-finance-ban" style="display: none;">
                    <label>5. Tình trạng tài chính xe (Ngân hàng / Cầm cố / Gốc)</label>
                    <select id="cus-finance-ban">
                        <option value="Không vay (Gốc)">Không vay (Gốc, Pháp lý chuẩn)</option>
                        <option value="Đang vay Ngân hàng">Đang vay Ngân hàng</option>
                        <option value="Đang cầm cố">Đang cầm cố</option>
                    </select>
                </div>

                <label>6. Phân loại khách (Nhãn độ mót)</label>
                <select id="cus-tag">
                    <option value="nong">🔥 NÓNG (Cần chốt ngay/Chờ xe)</option>
                    <option value="am">⚡ ẤM (Đang tham khảo/Đợi tiền)</option>
                    <option value="nguoi">❄️ NGUỘI (Chưa có nhu cầu gấp)</option>
                </select>

                <label>7. <span id="lbl-detail">Thông tin chi tiết yêu cầu</span></label>
                <textarea id="cus-detail" style="height: 100px;" placeholder="Ghi chú thêm về khách..."></textarea>

                <div id="field-images" style="display: none;">
                    <label>8. Hình ảnh xe thực tế (Chọn nhiều ảnh)</label>
                    <input type="file" id="cus-images" accept="image/*" multiple onchange="handleImagePreview(this)">
                    <div class="image-grid" id="preview-grid"></div>
                </div>

                <button class="btn btn-main" id="btn-save" onclick="saveCustomer()">
                    💾 LƯU DỮ LIỆU KHÁCH
                </button>
            </div>
        </div>

        <div id="tab-buyers" class="tab-content">
            <input type="text" class="search-bar" id="search-buyer" placeholder="🔍 Tìm tên, SĐT, loại xe mua..." oninput="renderList('mua')">
            <div id="list-buyers"></div>
        </div>

        <div id="tab-sellers" class="tab-content">
            <input type="text" class="search-bar" id="search-seller" placeholder="🔍 Tìm tên, SĐT, loại xe bán..." oninput="renderList('ban')">
            <div id="list-sellers"></div>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('input', this)">
            <span class="nav-icon">📝</span><span>NHẬP DATA</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="switchTab('buyers', this)">
            <span class="nav-icon">🛒</span><span>KHÁCH MUA</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="switchTab('sellers', this)">
            <span class="nav-icon">🚗</span><span>KHÁCH BÁN</span>
        </a>
    </div>

    <script>
        // --- 1. FIREBASE & CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVz4zVh8gxmNS4vbx39t0mVP7ZJJqH9T8",
            databaseURL: "https://sang-post-auto-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sang-post-auto"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";

        let allCustomers = [];

        // --- 2. GIAO DIỆN & TABS ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.background = isError ? "var(--danger)" : "var(--success)";
            t.style.color = isError ? "#fff" : "#000";
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        function toggleFormFields() {
            const type = document.getElementById('form-type').value;
            const isMua = (type === 'mua');
            
            document.getElementById('lbl-xe').innerText = isMua ? "khách cần" : "khách bán";
            document.getElementById('lbl-detail').innerText = isMua ? "Thông tin chi tiết yêu cầu" : "Tình trạng thực tế của xe";
            
            document.getElementById('field-finance-mua').style.display = isMua ? "block" : "none";
            document.getElementById('field-finance-ban').style.display = isMua ? "none" : "block";
            document.getElementById('field-images').style.display = isMua ? "none" : "block";
        }

        // --- 3. XỬ LÝ ẢNH (KHÁCH BÁN) ---
        function handleImagePreview(input) {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = "";
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => grid.innerHTML += `<div class="image-item"><img src="${e.target.result}"></div>`;
                    reader.readAsDataURL(file);
                });
            }
        }

        async function uploadImages(files) {
            const urls = [];
            const options = { maxSizeMB: 0.6, maxWidthOrHeight: 1024, useWebWorker: true };
            for (let file of files) {
                try {
                    const compressed = await imageCompression(file, options);
                    const formData = new FormData();
                    formData.append("image", compressed);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                    const resData = await res.json();
                    if(resData.success) urls.push(resData.data.url);
                } catch (err) { console.error("Lỗi up ảnh:", err); }
            }
            return urls;
        }

        // --- 4. LƯU DỮ LIỆU KHÁCH HÀNG ---
        async function saveCustomer() {
            const type = document.getElementById('form-type').value;
            const name = document.getElementById('cus-name').value.trim();
            const phone = document.getElementById('cus-phone').value.trim();
            const car = document.getElementById('cus-car').value.trim();
            
            if(!name || !phone || !car) return showToast("Vui lòng nhập Tên, SĐT và Loại xe!", true);

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "⏳ ĐANG XỬ LÝ LƯU...";

            let imageUrls = [];
            if (type === 'ban') {
                const files = document.getElementById('cus-images').files;
                if(files.length > 0) imageUrls = await uploadImages(files);
            }

            const customerData = {
                id: 'cus_' + Date.now(),
                type: type,
                name: name,
                phone: phone,
                car: car,
                year_color: document.getElementById('cus-year-color').value,
                finance: type === 'mua' ? document.getElementById('cus-finance-mua').value : document.getElementById('cus-finance-ban').value,
                tag: document.getElementById('cus-tag').value,
                details: document.getElementById('cus-detail').value,
                images: imageUrls,
                created_at: Date.now(),
                last_checked: Date.now() // Thời gian check lần cuối
            };

            await db.ref('crm_customers/' + customerData.id).set(customerData);
            
            showToast("✅ ĐÃ LƯU KHÁCH THÀNH CÔNG");
            setTimeout(() => location.reload(), 1500);
        }

        // --- 5. LẤY & HIỂN THỊ DỮ LIỆU (CÓ THUẬT TOÁN NHẮC NHỞ VIỀN ĐỎ) ---
        db.ref('crm_customers').on('value', (snap) => {
            allCustomers = [];
            if(snap.exists()) {
                snap.forEach(child => allCustomers.push(child.val()));
            }
            renderList('mua');
            renderList('ban');
        });

        function renderList(type) {
            const listDiv = document.getElementById(type === 'mua' ? 'list-buyers' : 'list-sellers');
            const searchKeyword = document.getElementById(type === 'mua' ? 'search-buyer' : 'search-seller').value.toLowerCase();
            
            listDiv.innerHTML = "";

            // Lọc theo Mua/Bán và Từ khóa tìm kiếm
            let filtered = allCustomers.filter(c => c.type === type);
            if(searchKeyword) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(searchKeyword) || 
                    c.phone.includes(searchKeyword) || 
                    c.car.toLowerCase().includes(searchKeyword)
                );
            }

            // --- THUẬT TOÁN SẮP XẾP & CẢNH BÁO ---
            const NOW = Date.now();
            const TWO_DAYS_MS = 2 * 24 * 60 * 60 * 1000; // 2 Ngày
            
            // Hàm đánh giá khách có bị "Bỏ quên" không (Nhãn Nóng + Quá 2 ngày chưa check)
            filtered.forEach(c => {
                c.isUrgent = (c.tag === 'nong' && (NOW - c.last_checked) > TWO_DAYS_MS);
            });

            // Sắp xếp: Khách Urgent lên đầu tiên, sau đó xếp theo thời gian mới nhất
            filtered.sort((a, b) => {
                if(a.isUrgent && !b.isUrgent) return -1;
                if(!a.isUrgent && b.isUrgent) return 1;
                return b.created_at - a.created_at;
            });

            if(filtered.length === 0) { listDiv.innerHTML = "<p style='text-align:center; color:#666;'>Chưa có dữ liệu.</p>"; return; }

            filtered.forEach(cus => {
                // Render UI Tag
                let tagUI = "";
                let tagLabel = "";
                if(cus.tag === 'nong') { tagUI = "tag-nong"; tagLabel = "🔥 NÓNG"; }
                if(cus.tag === 'am') { tagUI = "tag-am"; tagLabel = "⚡ ẤM"; }
                if(cus.tag === 'nguoi') { tagUI = "tag-nguoi"; tagLabel = "❄️ NGUỘI"; }

                // Kiểm tra Urgent UI
                let cardClass = cus.isUrgent ? "card urgent" : "card";
                let urgentBadge = cus.isUrgent ? `<div class="urgent-badge">🚨 QUÁ 2 NGÀY CHƯA TƯ VẤN</div>` : "";

                let html = `
                    <div class="${cardClass}">
                        ${urgentBadge}
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <h3 style="margin:0; color:var(--primary); font-size:18px;">${cus.name}</h3>
                            <span class="tag ${tagUI}">${tagLabel}</span>
                        </div>
                        <div class="cus-info">
                            <p>📞 SĐT: <strong><a href="tel:${cus.phone}" style="color:var(--accent); text-decoration:none;">${cus.phone}</a></strong></p>
                            <p>🚗 Loại xe: <strong>${cus.car}</strong> (${cus.year_color})</p>
                            <p>💰 Tài chính/Pháp lý: <strong>${cus.finance}</strong></p>
                            <p>📝 Ghi chú: <strong>${cus.details || 'Không có'}</strong></p>
                        </div>
                `;

                // Render Ảnh nếu là khách Bán
                if(cus.type === 'ban' && cus.images && cus.images.length > 0) {
                    html += `<div class="image-grid" style="margin-top:10px;">`;
                    cus.images.forEach(img => { html += `<div class="image-item"><img src="${img}"></div>`; });
                    html += `</div>`;
                }

                // Cập nhật thời gian check cuối
                let lastCheckStr = new Date(cus.last_checked).toLocaleString('vi-VN');

                html += `
                        <div style="margin-top:15px; border-top: 1px dashed var(--border); padding-top:10px;">
                            <p style="font-size:10px; color:var(--text-dim); margin:0;">Cập nhật lần cuối: ${lastCheckStr}</p>
                            <div style="display:flex; gap:10px;">
                                <button class="btn btn-check" style="flex:2;" onclick="markChecked('${cus.id}')">
                                    ✅ ĐÃ LIÊN HỆ / CẬP NHẬT
                                </button>
                                <button class="btn btn-outline" style="flex:1; color:var(--danger); border-color:var(--danger);" onclick="deleteCus('${cus.id}')">
                                    XÓA
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                listDiv.innerHTML += html;
            });
        }

        // --- 6. HÀM CẬP NHẬT TRẠNG THÁI & XÓA ---
        function markChecked(id) {
            db.ref('crm_customers/' + id).update({ last_checked: Date.now() });
            showToast("Đã lưu lịch sử chăm sóc!");
        }

        function deleteCus(id) {
            if(confirm("Xóa khách hàng này khỏi hệ thống?")) {
                db.ref('crm_customers/' + id).remove();
                showToast("Đã xóa dữ liệu.");
            }
        }

    </script>
</body>
</html>
