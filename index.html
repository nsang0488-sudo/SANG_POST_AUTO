<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANG AUTO PRO - PREMIUM CRM</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>

    <style>
        :root {
            --primary: #ffffff;
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #2563eb);
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --warning: #fbbf24;
            --success: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding-bottom: 90px;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: var(--card); padding: 40px 30px; border-radius: 24px;
            border: 1px solid var(--border); width: 90%; max-width: 360px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        #app-content { display: none; }

        .header {
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 19px; letter-spacing: 5px; font-weight: 900; margin: 0; color: #fff; }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 12px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin: 25px 0 10px 5px; display: flex; align-items: center; gap: 8px;}
        .section-title::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 4px; }
        
        .card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 15px; 
            position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
            color: #fff; padding: 15px; border-radius: 12px; font-size: 14px; margin-bottom: 18px;
        }

        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .image-item { aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; background: #222; border: 1px solid var(--border); }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; 
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-main { background: var(--text-main); color: #0f172a; }
        .btn-check { background: rgba(56, 189, 248, 0.1); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.3); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.3); }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px); border-top: 1px solid var(--border);
            display: flex; height: 85px; padding-bottom: 20px; z-index: 100;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); font-size: 8.5px; font-weight: 800; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 5px; }

        .tag { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; display: inline-block; }
        .tag-nong { background: rgba(244, 63, 94, 0.15); color: var(--danger); }
        .tag-am { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .tag-nguoi { background: rgba(56, 189, 248, 0.15); color: var(--accent); }

        #toast { 
            position: fixed; top: 90px; left: 50%; transform: translateX(-50%); 
            padding: 14px 28px; border-radius: 30px; font-weight: 800; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--accent)">HỆ THỐNG BẢO MẬT</h2>
            <p>SANG AUTO PRO CRM</p>
            <input type="password" id="access-key" placeholder="••••••" style="text-align: center; letter-spacing: 5px;">
            <button class="btn btn-main" onclick="verifyAccess()">MỞ KHÓA DỮ LIỆU</button>
        </div>
    </div>

    <div id="app-content">
        <div id="toast"></div>

        <div class="header">
            <h1>SANG AUTO PRO</h1>
            <span style="color: var(--accent); font-size: 10px; letter-spacing: 2px;">PREMIUM CRM SYSTEM</span>
        </div>

        <div class="container">
            <div id="tab-input" class="tab-content active">
                <h2 class="section-title">Phân loại dữ liệu</h2>
                <div class="card">
                    <select id="form-type" onchange="toggleFormFields()">
                        <option value="mua">🛒 KHÁCH CẦN MUA XE</option>
                        <option value="ban">🚗 KHÁCH CẦN BÁN XE</option>
                    </select>
                </div>

                <h2 class="section-title">Thông tin cơ bản</h2>
                <div class="card">
                    <label>Tên khách hàng</label>
                    <input type="text" id="cus-name" placeholder="VD: Anh Tuấn">
                    <label>Số điện thoại</label>
                    <input type="tel" id="cus-phone" placeholder="09xxxxxxxxx">
                    <label>Loại xe</label>
                    <input type="text" id="cus-car" placeholder="VD: Mazda 3, CX5...">
                    
                    <div id="field-images" style="display: none;">
                        <label>Hình ảnh xe thực tế</label>
                        <input type="file" id="cus-images" accept="image/*" multiple onchange="handleImagePreview(this)">
                        <div class="image-grid" id="preview-grid"></div>
                    </div>

                    <label>Ghi chú yêu cầu</label>
                    <textarea id="cus-detail" style="height: 100px;" placeholder="Ghi chú thêm..."></textarea>
                    
                    <label>Phân loại</label>
                    <select id="cus-tag">
                        <option value="nong">🔥 NÓNG</option>
                        <option value="am">⚡ ẤM</option>
                        <option value="nguoi">❄️ NGUỘI</option>
                    </select>
                    <button class="btn btn-main" id="btn-save" onclick="saveCustomer()">💾 LƯU DỮ LIỆU KHÁCH</button>
                </div>
            </div>

            <div id="tab-buyers" class="tab-content">
                <input type="text" class="search-bar" id="search-buyer" placeholder="🔍 Tìm khách mua..." oninput="renderList('mua')" style="width:100%; padding:15px; border-radius:12px; background:var(--card); color:#fff; border:1px solid var(--border); margin-bottom:15px;">
                <div id="list-buyers"></div>
            </div>
            <div id="tab-sellers" class="tab-content">
                <input type="text" class="search-bar" id="search-seller" placeholder="🔍 Tìm khách bán..." oninput="renderList('ban')" style="width:100%; padding:15px; border-radius:12px; background:var(--card); color:#fff; border:1px solid var(--border); margin-bottom:15px;">
                <div id="list-sellers"></div>
            </div>
            <div id="tab-closed" class="tab-content">
                <input type="text" class="search-bar" id="search-closed" placeholder="🔍 Tìm đã chốt..." oninput="renderList('chot')" style="width:100%; padding:15px; border-radius:12px; background:var(--card); color:#fff; border:1px solid var(--border); margin-bottom:15px;">
                <div id="list-closed"></div>
            </div>

            <div id="tab-hunt" class="tab-content">
                <h2 class="section-title">Cấu hình Bot săn tin</h2>
                <div class="card">
                    <label>1. ID Group Facebook</label>
                    <textarea id="hunt-groups" rows="3" placeholder="ID nhóm, cách nhau dấu phẩy"></textarea>
                    <label>2. Từ khóa lọc</label>
                    <input type="text" id="hunt-keywords" placeholder="VD: cần bán, chính chủ...">
                    <label>3. Thời gian quét (Phút)</label>
                    <input type="number" id="hunt-interval" value="10">
                    <button class="btn btn-main" id="btn-save-hunt" onclick="saveBotSettings()">⚙️ CẬP NHẬT LỆNH CHO BOT</button>
                </div>
                <h2 class="section-title">Tin xe mới săn được</h2>
                <div id="list-hunted"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('input', this)">
                <span class="nav-icon">📝</span><span>NHẬP</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchTab('buyers', this)">
                <span class="nav-icon">🛒</span><span>MUA</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchTab('sellers', this)">
                <span class="nav-icon">🚗</span><span>BÁN</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchTab('closed', this)">
                <span class="nav-icon">🏆</span><span>CHỐT</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchTab('hunt', this)">
                <span class="nav-icon">🎯</span><span>SĂN TIN</span>
            </a>
        </div>
    </div> 

    <script>
        // --- CONFIG & AUTH ---
        const firebaseConfig = { databaseURL: "https://sang-post-auto-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";

        function verifyAccess() {
            if (document.getElementById('access-key').value === '190525') {
                sessionStorage.setItem('crm_unlocked', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else { alert('❌ SAI MẬT KHẨU!'); }
        }
        if (sessionStorage.getItem('crm_unlocked') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }

        // --- GIAO DIỆN ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        function toggleFormFields() {
            const isBan = (document.getElementById('form-type').value === 'ban');
            document.getElementById('field-images').style.display = isBan ? "block" : "none";
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.style.background = "var(--success)";
            t.style.display = "block"; setTimeout(() => t.style.display = "none", 3000);
        }

        // --- XỬ LÝ ẢNH ---
        function handleImagePreview(input) {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = "";
            [...input.files].forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    grid.innerHTML += `<div class="image-item"><img src="${e.target.result}"></div>`;
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadImages(files) {
            let urls = [];
            for (let file of files) {
                const compressed = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1200 });
                let formData = new FormData(); formData.append("image", compressed);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) urls.push(json.data.url);
            }
            return urls;
        }

        // --- LƯU KHÁCH ---
        async function saveCustomer() {
            const name = document.getElementById('cus-name').value;
            const phone = document.getElementById('cus-phone').value;
            if(!name || !phone) return alert("Nhập tên và SĐT");
            
            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ ĐANG LƯU..."; btn.disabled = true;

            let imageUrls = [];
            if(document.getElementById('form-type').value === 'ban') {
                imageUrls = await uploadImages(document.getElementById('cus-images').files);
            }

            const id = 'cus_' + Date.now();
            await db.ref('crm_customers/' + id).set({
                id, name, phone,
                type: document.getElementById('form-type').value,
                car: document.getElementById('cus-car').value,
                tag: document.getElementById('cus-tag').value,
                details: document.getElementById('cus-detail').value,
                images: imageUrls,
                status: 'active',
                created_at: Date.now()
            });
            location.reload();
        }

        // --- RENDER DỮ LIỆU ---
        let allCustomers = [];
        db.ref('crm_customers').on('value', snap => {
            allCustomers = [];
            snap.forEach(c => allCustomers.push(c.val()));
            renderList('mua'); renderList('ban'); renderList('chot');
        });

        function renderList(type) {
            const listDiv = document.getElementById(type === 'mua' ? 'list-buyers' : (type === 'ban' ? 'list-sellers' : 'list-closed'));
            if(!listDiv) return;
            listDiv.innerHTML = "";
            let filtered = allCustomers.filter(c => type === 'chot' ? c.status === 'chot' : (c.type === type && c.status !== 'chot'));
            
            filtered.sort((a,b) => b.created_at - a.created_at).forEach(cus => {
                let imgs = "";
                if(cus.images) {
                    imgs = `<div class="image-grid" style="margin-top:10px;">${cus.images.map(url => `<div class="image-item"><img src="${url}"></div>`).join('')}</div>`;
                }
                listDiv.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${cus.name}</b>
                            <span class="tag tag-${cus.tag}">${cus.tag}</span>
                        </div>
                        <p>📞 ${cus.phone} <a href="https://zalo.me/${cus.phone.replace(/\D/g,'')}">💬 Zalo</a></p>
                        <p>🚗 ${cus.car}</p>
                        ${imgs}
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                            ${cus.status !== 'chot' ? `
                                <button class="btn btn-check" onclick="window.location.href='tel:${cus.phone}'">GỌI</button>
                                <button class="btn btn-success" onclick="db.ref('crm_customers/${cus.id}').update({status:'chot'})">CHỐT</button>
                            ` : `<button class="btn btn-danger" style="grid-column: span 2" onclick="db.ref('crm_customers/${cus.id}').remove()">XÓA</button>`}
                        </div>
                    </div>`;
            });
        }

        // --- BỘ SĂN TIN (TRUY VẤN ĐÚNG BẢNG CŨ) ---
        db.ref('config_bot').on('value', snap => {
            if(snap.exists()) {
                const d = snap.val();
                document.getElementById('hunt-groups').value = d.groups || "";
                document.getElementById('hunt-keywords').value = d.keywords || "";
                document.getElementById('hunt-interval').value = d.interval || 10;
            }
        });

        function saveBotSettings() {
            db.ref('config_bot').set({
                groups: document.getElementById('hunt-groups').value,
                keywords: document.getElementById('hunt-keywords').value,
                interval: document.getElementById('hunt-interval').value
            }).then(() => showToast("Đã cập nhật lệnh!"));
        }

        db.ref('san_tin').limitToLast(20).on('value', snap => {
            const div = document.getElementById('list-hunted'); div.innerHTML = "";
            let items = []; snap.forEach(c => { let v = c.val(); v.id = c.key; items.push(v); });
            items.reverse().forEach(item => {
                div.innerHTML += `
                    <div class="card" style="border-left:4px solid var(--accent)">
                        <p style="font-size:13px;">${item.content}</p>
                        <a href="${item.link}" target="_blank" class="btn btn-check">XEM BÀI VIẾT</a>
                        <button onclick="db.ref('san_tin/${item.id}').remove()" style="margin-top:5px; color:var(--danger); background:none; border:none; width:100%; font-size:10px;">XÓA TIN</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
