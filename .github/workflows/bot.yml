name: Bot San Tin Sang Auto Pro

on:
  workflow_dispatch:
  schedule:
    # 30 phút một lần (5h sáng - 23h đêm VN)
    - cron: '0,30 22-23 * * *'
    - cron: '0,30 0-15 * * *'
    - cron: '0 16 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # Giúp cài đặt nhanh hơn ở các lần chạy sau
          
      - name: Install packages
        run: npm install

      # Bước này cực kỳ quan trọng để Puppeteer chạy được trên Linux của GitHub
      - name: Install Google Chrome (Optional but safer)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 gstreamer1.0-libav libgbm1
        
      - name: Chạy Bot
        run: node crawler.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
