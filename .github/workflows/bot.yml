name: Bot San Tin Sang Auto Pro

on:
  workflow_dispatch:
  schedule:
    # 30 phút một lần từ 5h sáng đến 23h đêm (Giờ Việt Nam)
    - cron: '0,30 22-23 * * *'
    - cron: '0,30 0-15 * * *'
    - cron: '0 16 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          # Đã xóa dòng cache: npm để tránh lỗi thiếu file lock
          
      - name: Install packages
        run: npm install
        
      - name: Chạy Bot
        run: node crawler.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
